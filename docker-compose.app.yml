services:
  app:
    container_name: sidakota-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_DEFAULT_TENANT_SLUG=${NEXT_PUBLIC_DEFAULT_TENANT_SLUG}
        - NEXT_PUBLIC_UPLOAD_BASE_URL=${NEXT_PUBLIC_UPLOAD_BASE_URL:-/uploads}
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sidakota}:${POSTGRES_PASSWORD:-sidakota}@sidakota-db:5432/${POSTGRES_DB:-sidakota}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_DEFAULT_TENANT_SLUG=${NEXT_PUBLIC_DEFAULT_TENANT_SLUG}
      - NEXT_PUBLIC_UPLOAD_BASE_URL=${NEXT_PUBLIC_UPLOAD_BASE_URL:-/uploads}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - N8N_WEBHOOK_PAJAK_KENDARAAN=${N8N_WEBHOOK_PAJAK_KENDARAAN}
      - N8N_WEBHOOK_PBB=${N8N_WEBHOOK_PBB}
    volumes:
      - sidakota-uploads:/app/uploads
    networks:
      - sidakota-network
    env_file:
      - .env.production

volumes:
  sidakota-uploads:
    driver: local

networks:
  sidakota-network:
    external: true
