services:
  db:
    image: postgres:16-alpine
    container_name: simdata-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simdata}
      POSTGRES_USER: ${POSTGRES_USER:-simdata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simdata}
    volumes:
      - simdata-db-data:/var/lib/postgresql/data
      - ./backupdb:/backups
    ports:
      - "5455:5432"
    networks:
      - simdata-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simdata} -d ${POSTGRES_DB:-simdata}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  simdata-db-data:
    driver: local

networks:
  simdata-network:
    external: true
